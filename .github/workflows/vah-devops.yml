# Virtual Arts Hub：容器镜像构建并推送（便于对接任意支持 OCI 的云容器服务）
# 配置 Registry Secrets 后启用推送；未配置时可在 fork 上仅做 build 校验（见下方 if）

name: VAH build and push

on:
  push:
    branches: [main, master]
    paths:
      - "virtual-art-hub/**"
  pull_request:
    paths:
      - "virtual-art-hub/**"
  workflow_dispatch: {}

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request' && github.repository_owner != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (shared Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: ./virtual-art-hub
          file: ./virtual-art-hub/deploy/Dockerfile.backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository }}/vah-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: NPM_CONFIG_REGISTRY=https://registry.npmjs.org

      - name: Build gateway image
        uses: docker/build-push-action@v6
        with:
          context: ./virtual-art-hub
          file: ./virtual-art-hub/deploy/Dockerfile.gateway
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository }}/vah-gateway:latest
          build-args: NPM_CONFIG_REGISTRY=https://registry.npmjs.org

      - name: Build frontend + nginx proxy image
        uses: docker/build-push-action@v6
        with:
          context: ./virtual-art-hub
          file: ./virtual-art-hub/deploy/Dockerfile.frontend-with-proxy
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository }}/vah-web:latest
          build-args: NPM_CONFIG_REGISTRY=https://registry.npmjs.org
